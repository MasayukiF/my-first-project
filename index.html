<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d14;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #16162a;
      border: 1px solid #2a2a45;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(130, 100, 255, 0.08);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 11px 16px;
      background: #0d0d14;
      border: 1.5px solid #2a2a45;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #e2e2f0;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row input::placeholder {
      color: #4a4a6a;
    }

    .input-row input:focus {
      border-color: #7c5cfc;
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
    }

    .input-row button {
      padding: 11px 20px;
      background: linear-gradient(135deg, #7c5cfc, #5b8dee);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover {
      opacity: 0.85;
    }

    .input-row button:active {
      transform: scale(0.97);
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      background: #0d0d14;
      border-radius: 10px;
      padding: 4px;
    }

    .filters button {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 7px;
      background: transparent;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: #5a5a80;
    }

    .filters button.active {
      background: #1e1e38;
      color: #a78bfa;
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 10px;
      border-bottom: 1px solid #1e1e38;
      transition: background 0.15s;
      border-radius: 8px;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #1a1a30;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #a78bfa;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #c8c8e8;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.done span {
      text-decoration: line-through;
      color: #3a3a5a;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #3a3a5a;
      font-size: 1rem;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    li .delete-btn:hover {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }

    .footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #1e1e38;
      font-size: 0.82rem;
      color: #3a3a5a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer button {
      background: none;
      border: none;
      color: #3a3a5a;
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .footer button:hover {
      color: #f87171;
    }

    .empty {
      text-align: center;
      color: #2e2e50;
      padding: 32px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="新しいタスクを入力..." />
      <button onclick="addTodo()">追加</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">すべて</button>
      <button onclick="setFilter('active', this)">未完了</button>
      <button onclick="setFilter('done', this)">完了済み</button>
    </div>
    <ul id="todo-list"></ul>
    <div class="footer">
      <span id="count"></span>
      <button onclick="clearDone()">完了済みを削除</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<p class="empty">タスクがありません</p>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="${t.done ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span>${escapeHtml(t.text)}</span>
            <button class="delete-btn" onclick="remove(${t.id})">&#x2715;</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('count').textContent = `残り ${remaining} 件`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
