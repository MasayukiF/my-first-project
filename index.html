<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f6ef7;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3a57d6;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 6px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filters button.active {
      background: #4f6ef7;
      border-color: #4f6ef7;
      color: #fff;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #fafafa;
      border-radius: 8px;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f6ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 1rem;
      color: #333;
      word-break: break-all;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 1;
    }

    li .delete-btn:hover {
      color: #e55;
    }

    .footer {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer button {
      background: none;
      border: none;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .footer button:hover {
      color: #e55;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="新しいタスクを入力..." />
      <button onclick="addTodo()">追加</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">すべて</button>
      <button onclick="setFilter('active', this)">未完了</button>
      <button onclick="setFilter('done', this)">完了済み</button>
    </div>
    <ul id="todo-list"></ul>
    <div class="footer">
      <span id="count"></span>
      <button onclick="clearDone()">完了済みを削除</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<p class="empty">タスクがありません</p>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="${t.done ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span>${escapeHtml(t.text)}</span>
            <button class="delete-btn" onclick="remove(${t.id})">&#x2715;</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('count').textContent = `残り ${remaining} 件`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
